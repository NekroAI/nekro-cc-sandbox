name: Release Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  setup-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get Version
        id: get_version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      # CI 忽略 I001：见 test.yml 中 lint 步骤说明
      - name: Lint
        run: uv run ruff check src/ tests/ --extend-ignore I001

      - name: Unit tests
        run: uv run pytest tests/unit -v --tb=short

      - name: Integration tests
        run: uv run pytest tests/integration -v --tb=short

  build:
    name: Build (${{ matrix.platform }})
    needs: [setup-version, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Prepare platform slug
        id: prep
        run: echo "slug=${PLATFORM//\//-}" >> $GITHUB_OUTPUT
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=kromiose/nekro-cc-sandbox,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.prep.outputs.slug }}
          cache-to: type=gha,mode=max,scope=${{ steps.prep.outputs.slug }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.prep.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & Push Multi-arch Manifest
    needs: [setup-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Get lowercase repository owner
        id: repo
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest (Docker Hub)
        working-directory: /tmp/digests
        run: |
          VERSION=${{ needs.setup-version.outputs.version }}
          docker buildx imagetools create \
            --tag kromiose/nekro-cc-sandbox:${VERSION} \
            --tag kromiose/nekro-cc-sandbox:latest \
            $(printf 'kromiose/nekro-cc-sandbox@sha256:%s ' *)

      - name: Copy manifest to GHCR
        run: |
          VERSION=${{ needs.setup-version.outputs.version }}
          OWNER=${{ steps.repo.outputs.owner }}
          docker buildx imagetools create \
            --tag ghcr.io/${OWNER}/nekro-cc-sandbox:${VERSION} \
            --tag ghcr.io/${OWNER}/nekro-cc-sandbox:latest \
            kromiose/nekro-cc-sandbox:latest

      - name: Docker Logout
        run: |
          docker logout
          docker logout ghcr.io
